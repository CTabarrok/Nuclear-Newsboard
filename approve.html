<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Approve — Nuclear Newsboard</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2D2A2B; --bg-deep:#232021; --card:#343031; --card-edge:#3E3939;
    --gold:#C4A046; --gold-hi:#FFD572; --gold-dim:rgba(196,160,70,.28);
    --ink:#F0EBE3; --ink-dim:#A89F97; --ink-faint:#6E6764;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --serif:'Source Serif 4',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--serif);
       padding:28px clamp(16px,4vw,48px) 48px;min-height:100vh}
  header{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  h1{font-family:var(--mono);font-weight:600;font-size:clamp(14px,2vw,18px);
     letter-spacing:.28em;color:var(--gold-hi);text-transform:uppercase}
  .sub{font-family:var(--mono);font-size:12px;color:var(--ink-dim);margin-left:auto}
  .lede{margin-top:10px;color:var(--ink-dim);font-size:15px}
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px}
  @media(max-width:820px){.cards{grid-template-columns:1fr}}
  .pick{background:var(--card);border:1.5px solid var(--card-edge);border-radius:8px;
     overflow:hidden;display:flex;flex-direction:column;cursor:pointer;
     transition:border-color .15s ease,transform .15s ease;position:relative}
  .pick:hover{border-color:var(--gold-dim)}
  .pick.on{border-color:var(--gold-hi);transform:translateY(-2px)}
  .pick.on::after{content:"\2713";position:absolute;top:10px;right:10px;width:26px;height:26px;
     background:var(--gold-hi);color:var(--bg);border-radius:50%;display:grid;place-items:center;
     font-weight:bold;font-size:15px}
  .pick-img{aspect-ratio:16/9;background:var(--bg-deep)}
  .pick-img img{width:100%;height:100%;object-fit:cover;display:block}
  .pick-img .ph{height:100%;display:grid;place-items:center;color:var(--gold);font-size:38px}
  .pick-body{padding:12px 14px 14px;display:flex;flex-direction:column;gap:8px;flex:1}
  .chip{font-family:var(--mono);font-size:11px;font-weight:600;color:var(--bg);
     background:var(--gold);border-radius:3px;padding:1px 8px;align-self:flex-start}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
     text-transform:uppercase;color:var(--gold)}
  .eyebrow span{color:var(--ink-faint)}
  .pick h2{font-size:17px;line-height:1.3;font-weight:700}
  .pick h2 a{color:var(--ink);text-decoration:none}
  .pick h2 a:hover{color:var(--gold-hi)}
  .blurb{font-size:13.5px;line-height:1.5;color:var(--ink-dim);flex:1}
  .bar{position:sticky;bottom:0;margin-top:26px;background:var(--bg-deep);
     border:1px solid var(--card-edge);border-radius:8px;padding:14px 18px;
     display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .count{font-family:var(--mono);font-size:13px;color:var(--ink-dim)}
  .count b{color:var(--gold-hi)}
  button.go{margin-left:auto;font-family:var(--mono);font-weight:600;font-size:14px;
     letter-spacing:.06em;background:var(--gold);color:var(--bg);border:0;border-radius:5px;
     padding:11px 22px;cursor:pointer}
  button.go:hover:not(:disabled){background:var(--gold-hi)}
  button.go:disabled{opacity:.35;cursor:default}
  .msg{margin-top:20px;font-family:var(--mono);font-size:13px;line-height:1.6;
     padding:14px 16px;border-radius:6px;display:none}
  .msg.ok{display:block;background:rgba(196,160,70,.12);color:var(--gold-hi);
     border:1px solid var(--gold-dim)}
  .msg.err{display:block;background:rgba(180,70,60,.12);color:#E8A79E;
     border:1px solid rgba(180,70,60,.4)}
  .empty{margin-top:40px;text-align:center;color:var(--ink-dim);font-style:italic}
  .pick:focus-visible{outline:2px solid var(--gold-hi);outline-offset:2px}
</style>
</head>
<body>

<header>
  <svg width="38" height="38" viewBox="0 0 100 100" aria-hidden="true">
    <g fill="none" stroke="#C4A046" stroke-width="2.5">
      <ellipse cx="50" cy="50" rx="42" ry="16"/>
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(60 50 50)"/>
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(120 50 50)"/>
    </g>
    <circle cx="50" cy="50" r="6.5" fill="#FFD572"/>
  </svg>
  <h1>Newsboard Approval</h1>
  <div class="sub" id="editionDate"></div>
</header>
<p class="lede">Select the <b>three</b> stories for today's board, then publish. Nothing goes live until you do.</p>

<div class="cards" id="cards"></div>
<div class="empty" id="empty" hidden>No pending candidates found — the morning fetch may not have run yet.</div>

<div class="bar" id="bar" hidden>
  <div class="count"><b id="nSel">0</b> of 3 selected</div>
  <button class="go" id="publishBtn" disabled>Publish board</button>
</div>
<div class="msg" id="msg"></div>

<script>
(function(){
  // ── set once after deploying the Cloudflare Worker ──
  var WORKER_URL = "REPLACE_WITH_WORKER_URL";   // e.g. https://newsboard-approve.yourname.workers.dev

  var token = new URLSearchParams(location.search).get("t") || "";
  var selected = [], pendingDate = "";

  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

  function render(data){
    pendingDate = data.date;
    document.getElementById('editionDate').textContent = 'PENDING \u00B7 ' + data.date;
    var html = '';
    data.items.forEach(function(it, i){
      var img = it.image
        ? '<img src="' + esc(it.image) + '" alt="" loading="lazy">'
        : '<div class="ph">\u269B</div>';
      html +=
        '<div class="pick" role="checkbox" aria-checked="false" tabindex="0" data-i="' + (i+1) + '">' +
          '<div class="pick-img">' + img + '</div>' +
          '<div class="pick-body">' +
            '<span class="chip">STORY ' + (i+1) + '</span>' +
            '<div class="eyebrow">' + esc(it.category) + ' \u00B7 <span>' + esc(it.source) + '</span></div>' +
            '<h2><a href="' + esc(it.url) + '" target="_blank" rel="noopener" onclick="event.stopPropagation()">' + esc(it.title) + '</a></h2>' +
            '<p class="blurb">' + esc(it.blurb) + '</p>' +
          '</div>' +
        '</div>';
    });
    document.getElementById('cards').innerHTML = html;
    document.getElementById('bar').hidden = false;

    document.querySelectorAll('.pick').forEach(function(el){
      function toggle(){
        var n = parseInt(el.dataset.i, 10);
        var at = selected.indexOf(n);
        if (at >= 0){ selected.splice(at, 1); el.classList.remove('on'); el.setAttribute('aria-checked','false'); }
        else if (selected.length < 3){ selected.push(n); el.classList.add('on'); el.setAttribute('aria-checked','true'); }
        document.getElementById('nSel').textContent = selected.length;
        document.getElementById('publishBtn').disabled = (selected.length !== 3);
      }
      el.addEventListener('click', toggle);
      el.addEventListener('keydown', function(e){
        if (e.key === ' ' || e.key === 'Enter'){ e.preventDefault(); toggle(); }
      });
    });
  }

  function show(kind, text){
    var m = document.getElementById('msg');
    m.className = 'msg ' + kind;
    m.textContent = text;
  }

  document.getElementById('publishBtn').addEventListener('click', function(){
    var btn = this;
    btn.disabled = true; btn.textContent = 'Publishing\u2026';
    fetch(WORKER_URL, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ date: pendingDate, picks: selected.slice().sort().join(','), token: token })
    })
    .then(function(r){ return r.json().then(function(j){ return {ok: r.ok, j: j}; }); })
    .then(function(res){
      if (res.ok){
        show('ok', 'Approved \u2014 stories ' + selected.slice().sort().join(', ') +
             ' are publishing. The board updates in about a minute.');
        btn.textContent = 'Published \u2713';
      } else {
        show('err', 'Publish failed: ' + (res.j.error || 'unknown error') +
             (res.j.error && res.j.error.indexOf('token') > -1 ? ' \u2014 use the link from today\u2019s email.' : ''));
        btn.disabled = false; btn.textContent = 'Publish board';
      }
    })
    .catch(function(){
      show('err', 'Could not reach the approval service. Check WORKER_URL or try again.');
      btn.disabled = false; btn.textContent = 'Publish board';
    });
  });

  fetch('pending.json?v=' + Date.now())
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(render)
    .catch(function(){ document.getElementById('empty').hidden = false; });
})();
</script>
</body>
</html>
