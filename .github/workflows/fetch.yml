name: Morning fetch

on:
  schedule:
    - cron: "43 13 * * 1-5"   # 11:00 UTC = 6/7 AM Eastern, weekdays
  workflow_dispatch:          # run on demand from the Actions tab

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Fetch headlines + email picks
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO:   ${{ secrets.MAIL_TO }}
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          APPROVAL_SECRET: ${{ secrets.APPROVAL_SECRET }}
          REPO_SLUG: ${{ github.repository }}
        run: python fetch_headlines.py

      - name: Commit pending picks
        run: |
          git config user.name "newsboard-bot"
          git config user.email "actions@github.com"
          git add pending.json
          git diff --cached --quiet || git commit -m "Pending picks $(date -u +%F)"
          git push
