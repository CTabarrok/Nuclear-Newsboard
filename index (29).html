<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nuclear Newsboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,400&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#2D2A2B; --bg-deep:#232021; --card:#343031; --card-edge:#3E3939;
    --gold:#C4A046; --gold-hi:#FFD572; --gold-dim:rgba(196,160,70,.28);
    --ink:#F0EBE3; --ink-dim:#A89F97; --ink-faint:#6E6764;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
    --serif:'Source Serif 4',Georgia,serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:var(--serif);
       padding:28px clamp(16px,4vw,48px) 36px;min-height:100vh}

  /* ── masthead ─────────────────────────────────── */
  header{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
  .atom{width:44px;height:44px;flex:none}
  .atom .orbits{transform-origin:50% 50%;animation:spin 24s linear infinite}
  h1{font-family:var(--mono);font-weight:600;font-size:clamp(15px,2.2vw,20px);
     letter-spacing:.32em;color:var(--gold-hi);text-transform:uppercase;white-space:nowrap}
  .board-date{margin-left:auto;font-family:var(--mono);font-size:12px;
     color:var(--ink-dim);letter-spacing:.08em}
  .board-date b{color:var(--gold);font-weight:500}
  .trend{margin:14px 0 0;font-style:italic;font-size:15.5px;color:var(--ink-dim);
     max-width:70ch;border-left:2px solid var(--gold-dim);padding-left:12px}

  /* ── cards ────────────────────────────────────── */
  .cards{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:22px}
  @media(max-width:820px){.cards{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--card-edge);border-radius:8px;
     overflow:hidden;display:flex;flex-direction:column;position:relative;
     transition:transform .18s ease,border-color .18s ease}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;
     background:linear-gradient(90deg,var(--gold),var(--gold-hi));
     transform:scaleX(0);transform-origin:left;transition:transform .25s ease}
  .card:hover{transform:translateY(-3px);border-color:var(--gold-dim)}
  .card:hover::before{transform:scaleX(1)}
  .card-img{aspect-ratio:16/9;background:var(--bg-deep);position:relative;overflow:hidden}
  .card-img img{width:100%;height:100%;object-fit:cover;display:block;
     filter:saturate(.92) contrast(1.02)}
  .card-img .ph{position:absolute;inset:0;display:grid;place-items:center}
  .card-img .ph svg{width:76px;height:76px;opacity:.75}
  .card-img .ph .orbits{transform-origin:50% 50%;animation:spin 30s linear infinite}
  .card-body{padding:14px 16px 16px;display:flex;flex-direction:column;gap:9px;flex:1}
  .eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;
     text-transform:uppercase;color:var(--gold)}
  .eyebrow .src{color:var(--ink-faint)}
  .card h2{font-size:19px;line-height:1.28;font-weight:700}
  .card h2 a{color:var(--ink);text-decoration:none}
  .card h2 a:hover{color:var(--gold-hi)}
  .blurb{font-size:14px;line-height:1.5;color:var(--ink-dim);flex:1}
  .card-foot{font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);
     letter-spacing:.06em;display:flex;justify-content:space-between;align-items:center}
  .card-foot a{color:var(--gold);text-decoration:none}
  .card-foot a:hover{color:var(--gold-hi)}

  /* ── decay-chain day navigation ───────────────── */
  .chain-wrap{margin-top:30px;border-top:1px solid var(--card-edge);padding-top:16px}
  .chain-label{font-family:var(--mono);font-size:10.5px;letter-spacing:.2em;
     color:var(--ink-faint);text-transform:uppercase;margin-bottom:12px}
  .chain{display:flex;align-items:center;gap:0;overflow-x:auto;padding:6px 2px 10px;
     scrollbar-width:thin;scrollbar-color:var(--gold-dim) transparent}
  .chain button{background:none;border:0;cursor:pointer;font-family:var(--mono)}
  .arrow{color:var(--gold);font-size:18px;padding:4px 10px;flex:none;line-height:1}
  .arrow:hover:not(:disabled){color:var(--gold-hi)}
  .arrow:disabled{color:var(--ink-faint);cursor:default;opacity:.4}
  .link-seg{width:26px;height:1px;background:var(--gold-dim);flex:none}
  .node{flex:none;display:flex;flex-direction:column;align-items:center;gap:6px;
     padding:2px 4px;color:var(--ink-dim)}
  .node .dot{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--gold-dim);
     background:var(--bg);transition:all .15s ease}
  .node:hover .dot{border-color:var(--gold)}
  .node .lbl{font-size:10px;letter-spacing:.05em}
  .node.active .dot{background:var(--gold-hi);border-color:var(--gold-hi);
     box-shadow:0 0 10px rgba(255,213,114,.55)}
  .node.active .lbl{color:var(--gold-hi)}
  .node:focus-visible .dot,.arrow:focus-visible{outline:2px solid var(--gold-hi);outline-offset:2px}

  footer{margin-top:26px;font-family:var(--mono);font-size:10.5px;color:var(--ink-faint);
     letter-spacing:.06em;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px}
  .empty{margin-top:40px;text-align:center;color:var(--ink-dim);font-style:italic}

  @keyframes spin{to{transform:rotate(360deg)}}
  @media(prefers-reduced-motion:reduce){
    .atom .orbits,.card-img .ph .orbits{animation:none}
    .card,.card::before{transition:none}
  }
</style>
</head>
<body>

<header>
  <svg class="atom" viewBox="0 0 100 100" aria-hidden="true">
    <g class="orbits" fill="none" stroke="#C4A046" stroke-width="2.5">
      <ellipse cx="50" cy="50" rx="42" ry="16"/>
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(60 50 50)"/>
      <ellipse cx="50" cy="50" rx="42" ry="16" transform="rotate(120 50 50)"/>
    </g>
    <circle cx="50" cy="50" r="6.5" fill="#FFD572"/>
  </svg>
  <h1>Nuclear Newsboard</h1>
  <div class="board-date" id="boardDate"></div>
</header>

<p class="trend" id="trendNote" hidden></p>

<div class="cards" id="cards"></div>
<div class="empty" id="empty" hidden>No board published yet. The first edition lands after the morning fetch is approved.</div>

<div class="chain-wrap" id="chainWrap" hidden>
  <div class="chain-label">Previous editions</div>
  <div class="chain" id="chain" role="navigation" aria-label="Browse previous days"></div>
</div>

<footer>
  <span>Three distinct headlines each morning &middot; mapping the nuclear renaissance</span>
  <span id="srcNote"></span>
</footer>

<script>
(function(){
  var dates = [], idx = 0;

  var ATOM_PH =
    '<div class="ph"><svg viewBox="0 0 100 100" aria-hidden="true">' +
    '<g class="orbits" fill="none" stroke="#C4A046" stroke-width="2">' +
    '<ellipse cx="50" cy="50" rx="40" ry="15"/>' +
    '<ellipse cx="50" cy="50" rx="40" ry="15" transform="rotate(60 50 50)"/>' +
    '<ellipse cx="50" cy="50" rx="40" ry="15" transform="rotate(120 50 50)"/></g>' +
    '<circle cx="50" cy="50" r="6" fill="#C4A046"/></svg></div>';

  function esc(s){var d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}

  function fmtLong(iso){
    var d = new Date(iso + 'T12:00:00Z');
    return d.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'UTC'});
  }
  function fmtNode(iso){
    var d = new Date(iso + 'T12:00:00Z');
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'}).toUpperCase();
  }

  function renderBoard(data){
    document.getElementById('boardDate').innerHTML =
      'EDITION &middot; <b>' + esc(fmtLong(data.date)) + '</b>';
    var trend = document.getElementById('trendNote');
    if (data.trend_note){ trend.textContent = data.trend_note; trend.hidden = false; }
    else trend.hidden = true;

    var html = '';
    (data.items || []).forEach(function(it){
      var img = it.image
        ? '<img src="' + esc(it.image) + '" alt="" loading="lazy" ' +
          'onerror="this.parentNode.innerHTML=this.parentNode.dataset.ph">'
        : ATOM_PH;
      var when = '';
      if (it.published){
        var p = new Date(it.published);
        if (!isNaN(p)) when = p.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      }
      html +=
        '<article class="card">' +
          '<div class="card-img" data-ph=\'' + ATOM_PH.replace(/'/g,'&#39;') + '\'>' + img + '</div>' +
          '<div class="card-body">' +
            '<div class="eyebrow">' + esc(it.category) +
              ' &middot; <span class="src">' + esc(it.source) + '</span></div>' +
            '<h2><a href="' + esc(it.url) + '" target="_blank" rel="noopener">' + esc(it.title) + '</a></h2>' +
            '<p class="blurb">' + esc(it.blurb) + '</p>' +
            '<div class="card-foot"><span>' + esc(when) + '</span>' +
              '<a href="' + esc(it.url) + '" target="_blank" rel="noopener">Read &rarr;</a></div>' +
          '</div>' +
        '</article>';
    });
    document.getElementById('cards').innerHTML = html;

    var srcs = (data.items || []).map(function(i){return i.source;});
    document.getElementById('srcNote').textContent =
      srcs.length ? 'Sources: ' + srcs.filter(function(v,i,a){return a.indexOf(v)===i;}).join(' / ') : '';
  }

  function renderChain(){
    var wrap = document.getElementById('chainWrap');
    var chain = document.getElementById('chain');
    if (dates.length < 1){ wrap.hidden = true; return; }
    wrap.hidden = false;
    // dates is newest-first; draw oldest → newest, left → right
    var older = '<button class="arrow" id="olderBtn" aria-label="Older edition">&larr;</button>';
    var newer = '<button class="arrow" id="newerBtn" aria-label="Newer edition">&rarr;</button>';
    var nodes = '';
    for (var i = dates.length - 1; i >= 0; i--){
      nodes += '<button class="node' + (i === idx ? ' active' : '') + '" data-i="' + i + '"' +
               ' aria-label="Edition ' + esc(dates[i]) + '"' +
               (i === idx ? ' aria-current="true"' : '') + '>' +
               '<span class="dot"></span><span class="lbl">' + esc(fmtNode(dates[i])) + '</span></button>';
      if (i > 0) nodes += '<span class="link-seg"></span>';
    }
    chain.innerHTML = older + nodes + newer;
    document.getElementById('olderBtn').disabled = (idx === dates.length - 1);
    document.getElementById('newerBtn').disabled = (idx === 0);
    document.getElementById('olderBtn').onclick = function(){ go(idx + 1); };
    document.getElementById('newerBtn').onclick = function(){ go(idx - 1); };
    chain.querySelectorAll('.node').forEach(function(btn){
      btn.onclick = function(){ go(parseInt(btn.dataset.i, 10)); };
    });
    var active = chain.querySelector('.node.active');
    if (active && active.scrollIntoView) active.scrollIntoView({inline:'center', block:'nearest'});
  }

  function go(i){
    if (i < 0 || i >= dates.length) return;
    idx = i;
    fetch('news-' + dates[idx] + '.json?v=' + Date.now())
      .then(function(r){ if(!r.ok) throw 0; return r.json(); })
      .then(function(data){ renderBoard(data); renderChain(); })
      .catch(function(){
        document.getElementById('cards').innerHTML = '';
        document.getElementById('empty').textContent = 'Could not load the ' + dates[idx] + ' edition.';
        document.getElementById('empty').hidden = false;
      });
    document.getElementById('empty').hidden = true;
  }

  document.addEventListener('keydown', function(e){
    if (e.key === 'ArrowLeft') go(idx + 1);   // older
    if (e.key === 'ArrowRight') go(idx - 1);  // newer
  });

  fetch('archive_index.json?v=' + Date.now())
    .then(function(r){ if(!r.ok) throw 0; return r.json(); })
    .then(function(list){
      dates = (list.dates || []).slice().sort().reverse();
      if (!dates.length) throw 0;
      go(0);
    })
    .catch(function(){
      document.getElementById('empty').hidden = false;
      document.getElementById('boardDate').textContent = '';
    });
})();
</script>
</body>
</html>
